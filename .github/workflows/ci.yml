name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest httpx
        pip install -r requirements.txt

    - name: Lint and Format verification with Ruff
      run: |
        ruff check .
        ruff format --check .

    - name: Run Pytest
      env:
        PYTHONPATH: .
      run: |
        echo "=== Package Versions ==="
        pip show tree-sitter tree-sitter-python tree-sitter-javascript tree-sitter-typescript
        echo "=== Running Diagnostic Parse ==="
        python -c "
        import logging
        logging.basicConfig(level=logging.INFO)
        try:
            from tree_sitter import Language, Parser
            import tree_sitter_python as tspython
            print('Imported packages successfully.')
            lang = Language(tspython.language(), 'python')
            print('Loaded Python language:', lang)
            parser = Parser()
            parser.set_language(lang)
            print('Set language on parser successfully.')
            tree = parser.parse(b'def foo(): pass')
            print('Parsed dummy code successfully:', tree.root_node)
        except Exception as e:
            import traceback
            traceback.print_exc()
        "
        pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Verify Production Build
      run: |
        cd frontend
        npm run build

  vscode-extension-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: vscode-extension/package-lock.json

    - name: Install dependencies
      run: |
        cd vscode-extension
        npm ci

    - name: Compile TypeScript
      run: |
        cd vscode-extension
        npm run compile

    - name: Run tests (unit only)
      run: |
        cd vscode-extension
        npm test
